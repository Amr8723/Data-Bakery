
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Bakery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bakery: {
                50: '#fffbf0',
                100: '#ffefc2',
                200: '#ffe094',
                300: '#ffca5c',
                400: '#ffb029',
                500: '#f59e0b',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
              },
              stone: {
                850: '#1f1c18', // Deep warm charcoal
              }
            },
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            backgroundImage: {
              'noise': "url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.05%22/%3E%3C/svg%3E')",
              'wood-pattern': "repeating-linear-gradient(45deg, #e5e0d8 0px, #e5e0d8 2px, #f5f2eb 2px, #f5f2eb 8px)",
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'float-delayed': 'float 6s ease-in-out 3s infinite',
              'blob': 'blob 7s infinite',
              'shimmer': 'shimmer 2s linear infinite',
              'bounce-slight': 'bounce-slight 2s infinite',
              'stamp-in': 'stamp-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              'fade-in-up': 'fade-in-up 0.8s ease-out forwards',
              'wave': 'wave 2s infinite linear',
              'bubble': 'bubble 4s infinite ease-in',
              'heat-haze': 'heat-haze 2s infinite linear',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              },
              'bounce-slight': {
                  '0%, 100%': { transform: 'translateY(0)' },
                  '50%': { transform: 'translateY(-5px)' }
              },
              'stamp-in': {
                  '0%': { opacity: '0', transform: 'scale(2) rotate(-15deg)' },
                  '100%': { opacity: '1', transform: 'scale(1) rotate(-2deg)' }
              },
              'fade-in-up': {
                  '0%': { opacity: '0', transform: 'translateY(30px)' },
                  '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              wave: {
                  '0%': { transform: 'translateX(0) translateZ(0) scaleY(1)' },
                  '50%': { transform: 'translateX(-25%) translateZ(0) scaleY(0.55)' },
                  '100%': { transform: 'translateX(-50%) translateZ(0) scaleY(1)' }
              },
              bubble: {
                  '0%': { transform: 'translateY(100%) scale(0)', opacity: '0' },
                  '50%': { opacity: '0.6' },
                  '100%': { transform: 'translateY(-20%) scale(1.5)', opacity: '0' }
              },
              'heat-haze': {
                  '0%': { filter: 'blur(0px)', transform: 'translateY(0) scale(1)' },
                  '50%': { filter: 'blur(1px)', transform: 'translateY(-2px) scale(1.005)' },
                  '100%': { filter: 'blur(0px)', transform: 'translateY(0) scale(1)' }
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <style>
      body { 
          font-family: 'DM Sans', sans-serif; 
          background-color: #fffbf0;
          color: #1c1917;
      }
      
      /* Global Noise Overlay */
      .bg-grain::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 50;
        opacity: 0.4;
      }

      /* Premium Scrollbar */
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
      
      /* Selection Color */
      ::selection {
        background: #fdba74;
        color: #7c2d12;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0",
    "papaparse": "https://aistudiocdn.com/papaparse@^5.4.1",
    "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1",
    "jspdf": "https://aistudiocdn.com/jspdf@^3.0.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-grain">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
